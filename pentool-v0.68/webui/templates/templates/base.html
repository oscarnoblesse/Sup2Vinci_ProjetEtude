<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{ title or "Pentool WebUI" }}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="logo">PT</div>
          <div>
            <div class="brand-title">Pentool WebUI</div>
            <div class="brand-sub">Local • Détection only • Logs & reporting</div>
          </div>
        </div>

        <nav class="nav">
          <a href="/">Dashboard</a>
          <a href="/reports">Rapports</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <span>Flask • CSRF protected • Hardened headers</span>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </div>
</body>
</html>
